<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <!--Exercise 2:--->
    <table border="1">
<thead>
    <th>Name</th>
    <th>Age</th>
    <th>Height</th>
</thead>
<tbody>
    <tr>
        <td>Ahmed</td>
        <td>20</td>
        <td>173</td>
    </tr>
    <tr>
        <td colspan="2" style="color: black; background: yellow;">Double col span</td>
        <td>A</td>
    </tr>
    <tr>
        <td rowspan="2">row span</td>
        <td>B</td>
        <td>C</td>
    </tr>
    <tr>
        <td>f</td>
        <td>c</td>

</tbody>
    </table>
</body>
</html>
